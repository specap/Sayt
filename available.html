<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Автомобили в наличии</title>
    <style>
        /* Базовые настройки для всего сайта */
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: Arial, sans-serif;
        }

        body {
            background-color: #f7f7f7;
            color: #222222;
        }

        /* Наша стандартная шапка сайта */
        .site-header {
            background-color: #ffffff;
            border-bottom: 1px solid #e0e0e0;
            padding: 15px 20px;
            position: sticky;
            top: 0;
            z-index: 100;
        }

        .header-wrap {
            max-width: 1300px;
            margin: 0 auto;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .header-logo a {
            font-size: 24px;
            font-weight: 900;
            color: #111;
            text-decoration: none;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .header-menu ul {
            display: flex;
            list-style: none;
            gap: 25px;
        }

        .header-menu a {
            color: #444;
            text-decoration: none;
            font-size: 14px;
            font-weight: 600;
        }

        .header-menu a:hover {
            color: #ff6600; /* Главный оранжевый цвет */
        }

        /* Главный контейнер для контента страницы */
        .page-content {
            max-width: 1300px;
            margin: 40px auto;
            padding: 0 20px;
        }

        /* Хлебные крошки и заголовок */
        .page-crumbs {
            font-size: 12px;
            color: #999;
            margin-bottom: 15px;
        }

        .page-title {
            font-size: 36px;
            font-weight: bold;
            text-transform: uppercase;
            margin-bottom: 30px;
        }

        /* Блок с двумя промо-баннерами сверху */
        .top-banners {
            display: flex;
            gap: 20px;
            margin-bottom: 40px;
        }

        .banner-box {
            flex: 1;
            background-color: #333;
            background-size: cover;
            background-position: center;
            height: 240px;
            padding: 30px;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            color: #ffffff;
        }

        /* Подключаем фоновые картинки для баннеров из папки img */
        .banner-largus {
            background-image: linear-gradient(rgba(0,0,0,0.2), rgba(0,0,0,0.4)), url('img/banner_largus.jpg');
        }

        .banner-granta {
            background-image: linear-gradient(rgba(0,0,0,0.2), rgba(0,0,0,0.4)), url('img/banner_granta.jpg');
        }

        .banner-box h2 {
            font-size: 24px;
            text-transform: uppercase;
            margin-bottom: 10px;
            text-shadow: 1px 1px 4px rgba(0,0,0,0.6);
        }

        .banner-box p {
            font-size: 14px;
            color: #e0e0e0;
            font-weight: bold;
            text-shadow: 1px 1px 3px rgba(0,0,0,0.6);
        }

        .banner-link {
            display: inline-block;
            background-color: #ff6600;
            color: #fff;
            padding: 10px 20px;
            text-decoration: none;
            font-weight: bold;
            font-size: 12px;
            text-transform: uppercase;
            align-self: flex-start;
        }

        /* Панель с количеством авто */
        .info-counter-bar {
            background-color: #ffffff;
            border: 1px solid #e0e0e0;
            padding: 15px 20px;
            font-size: 14px;
            margin-bottom: 25px;
            display: flex;
            justify-content: space-between;
        }

        .info-counter-bar span {
            color: #ff6600;
            font-weight: bold;
        }

        /* Лейаут: Фильтры слева + Машины справа */
        .main-catalog-layout {
            display: flex;
            gap: 25px;
        }

        /* Сайдбар с фильтрами */
        .sidebar-filters {
            width: 280px;
            background-color: #ffffff;
            border: 1px solid #e0e0e0;
            padding: 20px;
            height: fit-content;
        }

        .filter-group {
            border-bottom: 1px solid #eee;
            padding-bottom: 15px;
            margin-bottom: 15px;
        }

        .filter-group:last-child {
            border: none;
            margin-bottom: 0;
            padding-bottom: 0;
        }

        .filter-name {
            font-weight: bold;
            font-size: 14px;
            color: #333;
            margin-bottom: 10px;
        }

        .filter-val-orange {
            color: #ff6600;
            font-weight: bold;
        }

        /* Сетка с карточками автомобилей */
        .cars-container {
            flex: 1;
        }

        .cars-flex-grid {
            display: flex;
            flex-wrap: wrap;
            gap: 20px;
        }

        .car-item-card {
            background-color: #ffffff;
            border: 1px solid #e0e0e0;
            width: 31%; /* Три карточки в ряд */
            min-width: 260px;
            padding: 20px;
            display: flex;
            flex-direction: column;
            position: relative;
        }

        .car-item-card:hover {
            border-color: #b1b1b1;
        }

        .car-item-title {
            font-size: 14px;
            font-weight: bold;
            text-transform: uppercase;
        }

        .car-item-version {
            font-size: 24px;
            font-weight: 300;
            color: #666;
            margin-top: 4px;
            margin-bottom: 15px;
        }

        .car-item-image {
            width: 100%;
            height: 150px;
            object-fit: contain;
            margin-bottom: 15px;
        }

        .car-badge {
            background-color: #ff6600;
            color: #fff;
            font-size: 11px;
            font-weight: bold;
            padding: 4px 8px;
            text-transform: uppercase;
            align-self: flex-start;
            margin-bottom: 15px;
        }

        .car-price-block {
            display: flex;
            justify-content: space-between;
            align-items: flex-end;
            margin-top: auto; /* Прижимает цену к низу карточки */
            border-top: 1px solid #eee;
            padding-top: 15px;
        }

        .car-price-main {
            font-size: 20px;
            font-weight: bold;
        }

        .car-price-credit {
            font-size: 11px;
            color: #777;
            text-align: right;
        }

        .car-price-credit div {
            font-weight: bold;
            color: #222;
            font-size: 13px;
        }

        /* Кнопка "Показать еще" */
        .more-btn-box {
            width: 100%;
            margin-top: 30px;
        }

            display: block
